bundle:
  name: facilityiq

resources:
  apps:
    app:
      name: "facilityiq"
      description: "FacilityIQ analyst app backed by Unity Catalog Delta tables"
      source_code_path: ./
      user_api_scopes:
        - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: a4e1c80a2e8ea399
            permission: CAN_USE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-9924376b-eaa9.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}/dev

  prod:
    mode: production
    workspace:
      host: https://dbc-9924376b-eaa9.cloud.databricks.com
      root_path: /Workspace/prod/${bundle.name}
